<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#000;
color:#fff;
text-align:center;
padding:15px;
}

/* SEARCH BAR */
.search-box{
padding:15px;
background:white;
position:sticky;
top:0;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.container{
padding:10px;
}

/* MOBILE FIRST PRODUCT GRID */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:15px;
margin:8px 0;
}

.price{
color:green;
font-weight:bold;
margin-bottom:8px;
}

button{
width:100%;
background:#ff6600;
border:none;
padding:10px;
color:white;
border-radius:6px;
font-size:14px;
}

footer{
text-align:center;
padding:15px;
font-size:14px;
color:#555;
}

/* DESKTOP VIEW */
@media(min-width:768px){
.products{
grid-template-columns:repeat(4,1fr);
}
}

</style>

<script>
function searchProducts(){
let input=document.getElementById('search').value.toLowerCase();
let cards=document.getElementsByClassName('card');

for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();

if(text.includes(input)){
cards[i].style.display='block';
}else{
cards[i].style.display='none';
}
}
}
</script>

</head>
