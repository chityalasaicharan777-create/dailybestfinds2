<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DailyBestFinds21</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#000;
color:#fff;
text-align:center;
padding:15px;
}

/* SEARCH BAR */
.search-box{
padding:15px;
background:white;
position:sticky;
top:0;
}

.search-box input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

.container{
padding:10px;
}

/* MOBILE FIRST PRODUCT GRID */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

.card h3{
font-size:15px;
margin:8px 0;
}

.price{
color:green;
font-weight:bold;
margin-bottom:8px;
}

button{
width:100%;
background:#ff6600;
border:none;
padding:10px;
color:white;
border-radius:6px;
font-size:14px;
}

footer{
text-align:center;
padding:15px;
font-size:14px;
color:#555;
}

/* DESKTOP VIEW */
@media(min-width:768px){
.products{
grid-template-columns:repeat(4,1fr);
}
}

</style>

<script>
function searchProducts(){
let input=document.getElementById('search').value.toLowerCase();
let cards=document.getElementsByClassName('card');

for(let i=0;i<cards.length;i++){
let text=cards[i].innerText.toLowerCase();

if(text.includes(input)){
cards[i].style.display='block';
}else{
cards[i].style.display='none';
}
}
}
</script>

</head>

<body>

<header>
<h2>DailyBestFinds21</h2>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search products..." onkeyup="searchProducts()">
</div>

<div class="container">

<div class="products">

<div class="card">
<img src="https://rukminim2.flixcart.com/image/1536/1536/xif0q/shoe/j/v/4/-original-imahgcsbgtyr3ygg.jpeg?q=90">
<h3>Sneakers</h3>
<div class="price">₹909</div>
<a href="https://fkrt.co/4EMFG7"><button>Buy Now</button></a>
</div>

<div class="card">
<img src="watch.jpg">
<h3>Men Watch</h3>
<div class="price">₹499</div>
<a href="#"><button>Buy Now</button></a>
</div>

<div class="card">
<img src="bag.jpg">
<h3>Handbag</h3>
<div class="price">₹599</div>
<a href="#"><button>Buy Now</button></a>
</div>

<div class="card">
<img src="heels.jpg">
<h3>Heels</h3>
<div class="price">₹799</div>
<a href="#"><button>Buy Now</button></a>
</div>

<div class="card">
<img src="toy.jpg">
<h3>Kids Toy</h3>
<div class="price">₹299</div>
<a href="#"><button>Buy Now</button></a>
</div>

<div class="card">
<img src="bag2.jpg">
<h3>School Bag</h3>
<div class="price">₹499</div>
<a href="#"><button>Buy Now</button></a>
</div>

</div>

</div>

<footer>
© 2026 DailyBestFinds21
</footer>

</body>
</html>
